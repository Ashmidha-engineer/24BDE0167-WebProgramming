<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ride Details</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#f5f5f5;
}

/* MAIN CONTAINER */

.container{
    display:flex;
    min-height:100vh;
}

/* LEFT SIDE IMAGE */

.image-section{
    flex:1;
    background:#000;
}

.image-section img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* RIGHT SIDE CONTENT */

.content-section{
    flex:1;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    background:white;
}

.content-section h1{
    font-size:40px;
    margin-bottom:20px;
}

.content-section p{
    font-size:18px;
    line-height:1.6;
    color:#555;
    margin-bottom:30px;
}

.image-section{
    flex:1;
    background:#f5f5f5;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px; /* adds space around image */
}

.image-section img{
    width:100%;
    height:100%;
    max-height:80vh;
    object-fit:cover;

    border:6px solid #fff;       /* white border */
    border-radius:12px;          /* rounded corners */
    box-shadow:0 10px 30px rgba(0,0,0,0.15); /* soft shadow */
}

.details{
    margin-bottom:30px;
}

.details p{
    margin:5px 0;
    font-size:16px;
}

/* BUTTON */

button{
    width:150px;
    padding:12px;
    background:#ff9900;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

/* RESPONSIVE */

@media(max-width:768px){
    .container{
        flex-direction:column;
    }
    .image-section{
        height:300px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT IMAGE -->
    <div class="image-section">
        <img id="rideImage">
    </div>

    <!-- RIGHT CONTENT -->
    <div class="content-section">
        <h1 id="rideName"></h1>

        <p id="rideDesc"></p>

        <div class="details">
            <p><strong>Thrill Level:</strong> High</p>
            <p><strong>Duration:</strong> 2-5 minutes</p>
            <p><strong>Age Limit:</strong> 10+</p>
        </div>

        <button onclick="goBack()">⬅ Back</button>
    </div>

</div>

<script>
function getParams(){
    const params = new URLSearchParams(window.location.search);
    return {
        name: params.get("name"),
        img: params.get("img")
    };
}

function loadRide(){
    const ride = getParams();

    document.getElementById("rideName").innerText = ride.name;
    document.getElementById("rideImage").src = ride.img;

    let descriptions = {
        "Splash Coaster": "A high-speed water coaster combining sharp turns, steep drops, and refreshing splashes. Perfect for thrill seekers who love water rides.",
        "Sky Flyer": "Soar high above the park and enjoy breathtaking panoramic views. A smooth yet thrilling flying experience.",
        "Water Ride": "A fun-filled family ride packed with twists, turns, and cooling water effects to beat the heat.",
        "Thrilling Drop": "Brace yourself for a vertical free fall that will get your adrenaline pumping like never before.",
        "Spinning Ride": "A dizzying spinning experience that tests your balance and keeps you laughing throughout.",
        "Jungle Adventure": "Step into a wild jungle expedition filled with surprises, sounds, and exciting turns."
    };

    document.getElementById("rideDesc").innerText =
        descriptions[ride.name] || "Enjoy this amazing ride!";
}

function goBack(){
    window.location.href = 'ride.html';
}

loadRide();
</script>

</body>
</html>
